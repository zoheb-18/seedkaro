          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="index.html">HOME</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="index.html#our-feature">OUR FEATURES</a>

<section id="form">
  <div class="container pt-5 d-flex justify-content-center align-items-center">
    <div class="border sign-form bg-body-tertiary shadow">
      <h2 class="hcolor ps-3 ps-md-4">Create Account</h2>
      <div class="ps-3 ps-md-4">
        <div class="mb-3">
          <label for="fullNameInput" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullNameInput" placeholder="Enter Full Name">
        </div>
        <div class="mb-3">
          <label for="emailInputSignup" class="form-label">Email address</label>
          <input type="email" class="form-control" id="emailInputSignup" placeholder="Enter Email address">
          <p class="text-secondary small mt-2">We'll never share your email with anyone else.</p>
        </div>
        <div class="mb-3">
          <label for="passwordInputSignup" class="form-label">Password</label>
          <input type="password" class="form-control" id="passwordInputSignup" placeholder="Enter Password">
        </div>
        <div class="mb-3">
          <button type="button" class="Register-button rounded-pill">Register</button>
        </div>
      </div>
    </div>
  </div>
</section>
<section>
  <div class="container-fluid bg-dark p-3 p-md-4">
    <div class="row g-3">
      <div class="col-md-6 d-flex align-items-center justify-content-center justify-content-md-start">
        <p class="mb-0 all-right text-center text-md-start">© 2023 All Rights Reserved, SeedKaro</p>
      </div>
      <div class="col-md-6">
        <div class="d-flex justify-content-center gap-2 flex-wrap">
          <img src="image/call.png" alt="Call" class="insta">
          <img src="image/envelope.png" alt="Email" class="insta">
          <img src="image/facebook.png" alt="Facebook" class="insta">
          <img src="image/instagram.png" alt="Instagram" class="insta">
          <img src="image/social.png" alt="Social" class="insta">
          <button class="uparrow">^</button>
        </div>
      </div>
    </div>
  </div>
</section>
